        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: theme('colors.gray.300'); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: theme('colors.primary.DEFAULT'); }
        .input-field { @apply w-full px-4 py-3 rounded-card border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-smooth; }
        .btn-primary { @apply bg-primary hover:bg-primary-dark text-white font-medium py-3 px-6 rounded-btn transition-smooth transform hover:-translate-y-1 shadow-card hover:shadow-hover; }
        .btn-secondary { @apply bg-secondary hover:bg-secondary-dark text-white font-medium py-3 px-6 rounded-btn transition-smooth transform hover:-translate-y-1 shadow-card hover:shadow-hover; }
        .btn-outline { @apply border-2 border-primary text-primary hover:bg-primary hover:text-white font-medium py-3 px-6 rounded-btn transition-smooth; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .animate-float { animation: float 4s ease-in-out infinite; }
        @layer utilities {
            .glass {
                @apply bg-white bg-opacity-90 backdrop-filter backdrop-blur-lg;
            }
        }
    </style>
</head>

    <!-- Scripts -->
    <script src="js/artisans-data.js"></script>
    <script>
        // Search Logic
        let currentFilters = {
            query: '',
            location: '',
            categories: [],
            maxPrice: 50000,
            minRating: 4,
            sort: 'relevance'
        };

        function initSearch() {
            const urlParams = new URLSearchParams(window.location.search);
            currentFilters.query = urlParams.get('query') || '';
            currentFilters.location = urlParams.get('location') || '';
            const cat = urlParams.get('category');
            if (cat) {
                currentFilters.categories = [cat];
                // Check the corresponding checkbox
                const checkbox = document.querySelector(`#category-filters input[value="${cat}"]`);
                if (checkbox) checkbox.checked = true;
            }

            // Set input values
            document.getElementById('nav-search-input').value = currentFilters.query;
            document.getElementById('nav-location-input').value = currentFilters.location;

            renderResults();
            setupEventListeners();
        }

        function setupEventListeners() {
            // Categories
            document.getElementById('category-filters').addEventListener('change', (e) => {
                const checked = Array.from(document.querySelectorAll('#category-filters input:checked')).map(i => i.value);
                currentFilters.categories = checked;
                renderResults();
            });

            // Price range
            const priceRange = document.getElementById('price-range');
            const priceValue = document.getElementById('price-value');
            priceRange.addEventListener('input', (e) => {
                const val = e.target.value;
                priceValue.textContent = parseInt(val).toLocaleString();
                currentFilters.maxPrice = parseInt(val);
                renderResults();
            });

            // Rating
            document.getElementById('rating-filters').addEventListener('change', (e) => {
                currentFilters.minRating = parseFloat(e.target.value);
                renderResults();
            });

            // Sort
            document.getElementById('sort-select').addEventListener('change', (e) => {
                currentFilters.sort = e.target.value;
                renderResults();
            });

            // Reset
            document.getElementById('reset-filters').addEventListener('click', () => {
                currentFilters = {
                    query: '',
                    location: '',
                    categories: [],
                    maxPrice: 50000,
                    minRating: 0,
                    sort: 'relevance'
                };
                // Reset UI
                document.querySelectorAll('#category-filters input').forEach(i => i.checked = false);
                document.getElementById('price-range').value = 50000;
                document.getElementById('price-value').textContent = '50 000';
                document.querySelector('#rating-filters input[value="0"]').checked = true;
                document.getElementById('sort-select').value = 'relevance';
                document.getElementById('nav-search-input').value = '';
                document.getElementById('nav-location-input').value = '';
                
                renderResults();
            });
        }

        function performNavSearch() {
            currentFilters.query = document.getElementById('nav-search-input').value;
            currentFilters.location = document.getElementById('nav-location-input').value;
            renderResults();
        }

        function renderResults() {
            const grid = document.getElementById('artisans-grid');
            const countLabel = document.getElementById('results-count');
            const tagsContainer = document.getElementById('active-tags');

            // 1. Filter
            let filtered = artisans.filter(a => {
                const matchQuery = !currentFilters.query || 
                    a.name.toLowerCase().includes(currentFilters.query.toLowerCase()) || 
                    a.job.toLowerCase().includes(currentFilters.query.toLowerCase()) ||
                    a.category.toLowerCase().includes(currentFilters.query.toLowerCase());
                
                const matchLocation = !currentFilters.location || 
                    a.location.toLowerCase().includes(currentFilters.location.toLowerCase());
                
                const matchCategory = currentFilters.categories.length === 0 || 
                    currentFilters.categories.includes(a.category);
                
                const matchPrice = a.price === 0 || a.price <= currentFilters.maxPrice;
                
                const matchRating = a.rating >= currentFilters.minRating;

                return matchQuery && matchLocation && matchCategory && matchPrice && matchRating;
            });

            // 2. Sort
            if (currentFilters.sort === 'rating') {
                filtered.sort((a, b) => b.rating - a.rating);
            } else if (currentFilters.sort === 'price-asc') {
                filtered.sort((a, b) => (a.price || Infinity) - (b.price || Infinity));
            } else if (currentFilters.sort === 'price-desc') {
                filtered.sort((a, b) => b.price - a.price);
            }

            // 3. Update UI
            countLabel.textContent = `${filtered.length} artisan${filtered.length > 1 ? 's' : ''} trouvé${filtered.length > 1 ? 's' : ''} ${currentFilters.query ? `pour "${currentFilters.query}"` : ''}`;
            
            // Tags
            tagsContainer.innerHTML = '';
            if (currentFilters.categories.length > 0) {
                currentFilters.categories.forEach(cat => addTag(cat, 'category'));
            }
            if (currentFilters.location) addTag(currentFilters.location, 'location');
            if (currentFilters.minRating > 0) addTag(`${currentFilters.minRating}+ Étoiles`, 'rating');

            // Grid
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-20 text-center">
                        <i class="fa-solid fa-search text-gray-200 text-6xl mb-4"></i>
                        <p class="text-gray-500">Aucun artisan ne correspond à vos critères.</p>
                        <button onclick="document.getElementById('reset-filters').click()" class="mt-4 text-primary font-bold hover:underline">Réinitialiser les filtres</button>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filtered.map(a => `
                <div class="bg-white rounded-card overflow-hidden shadow-card hover:shadow-hover transition-smooth group cursor-pointer flex flex-col" onclick="window.location.href='profile-artisan.html?id=${a.id}'">
                    <div class="h-48 bg-gray-200 relative overflow-hidden shrink-0">
                        <img src="${a.avatar}" alt="${a.name}" class="w-full h-full object-cover group-hover:scale-105 transition-smooth duration-500">
                        <div class="absolute top-4 right-4 bg-white p-2 rounded-full text-gray-400 hover:text-red-500 transition-smooth shadow-sm z-10" onclick="toggleHeart(event, this)">
                            <i class="fa-regular fa-heart"></i>
                        </div>
                        <div class="absolute bottom-4 left-4 bg-white px-3 py-1 rounded-full text-xs font-bold text-primary shadow-sm">
                            ${a.category}
                        </div>
                    </div>
                    <div class="p-5 flex-1 flex flex-col">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-lg font-bold text-gray-900 group-hover:text-primary transition-smooth line-clamp-1">${a.name}</h3>
                            ${a.verified ? `
                            <div class="flex items-center bg-green-100 px-2 py-0.5 rounded text-green-700 text-xs font-bold shrink-0 ml-2">
                                <i class="fa-solid fa-check-circle mr-1"></i> Vérifié
                            </div>` : ''}
                        </div>
                        <p class="text-sm text-gray-500 mb-2 line-clamp-1">${a.job}</p>
                        <div class="flex items-center text-sm text-gray-500 mb-4">
                            <i class="fa-solid fa-location-dot mr-2"></i> ${a.location}
                        </div>
                        <div class="mt-auto pt-4 border-t border-gray-100 flex items-center justify-between">
                            <div class="flex items-center">
                                <i class="fa-solid fa-star text-yellow-400 text-sm"></i>
                                <span class="ml-1 font-bold text-gray-900 text-sm">${a.rating}</span>
                                <span class="ml-1 text-gray-400 text-xs hidden sm:inline-block">(${a.reviews} avis)</span>
                            </div>
                            <span class="font-bold text-secondary text-base">${a.priceText}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addTag(text, type) {
            const tag = document.createElement('span');
            tag.className = 'inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-blue-100 text-primary';
            tag.innerHTML = `
                ${text}
                <button onclick="removeFilter('${text}', '${type}')" class="ml-1.5 text-primary hover:text-primary-dark focus:outline-none"><i class="fa-solid fa-times"></i></button>
            `;
            document.getElementById('active-tags').appendChild(tag);
        }

        function removeFilter(value, type) {
            if (type === 'category') {
                const checkbox = document.querySelector(`#category-filters input[value="${value}"]`);
                if (checkbox) checkbox.checked = false;
                currentFilters.categories = currentFilters.categories.filter(c => c !== value);
            } else if (type === 'location') {
                currentFilters.location = '';
                document.getElementById('nav-location-input').value = '';
            } else if (type === 'rating') {
                currentFilters.minRating = 0;
                document.querySelector('#rating-filters input[value="0"]').checked = true;
            }
            renderResults();
        }

        function toggleHeart(event, element) {
            event.stopPropagation();
            const icon = element.querySelector('i');
            if (icon.classList.contains('fa-regular')) {
                icon.classList.replace('fa-regular', 'fa-solid');
                element.classList.replace('text-gray-400', 'text-red-500');
            } else {
                icon.classList.replace('fa-solid', 'fa-regular');
                element.classList.replace('text-red-500', 'text-gray-400');
            }
        }

        // Initialize on load
        window.addEventListener('load', initSearch);

        // Mobile Menu Toggle
        document.getElementById('mobile-menu-btn').addEventListener('click', function () {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });
    </script>
</body>
</html>
